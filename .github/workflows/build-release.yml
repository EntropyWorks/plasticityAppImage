name: Build and Release AppImage

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      already_released: ${{ steps.versions.outputs.already_released }}
    steps:
      - name: Check for new Plasticity release
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          LATEST=$(gh api repos/nkallen/plasticity/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

          if gh release view "v${LATEST}" --repo "${REPO}" > /dev/null 2>&1; then
            echo "already_released=true" >> $GITHUB_OUTPUT
            echo "v${LATEST} already released — nothing to do."
          else
            echo "already_released=false" >> $GITHUB_OUTPUT
            echo "New release found: v${LATEST} — starting build."
          fi

  build:
    needs: check
    if: needs.check.outputs.already_released == 'false'
    runs-on: ubuntu-latest
    container: docker.io/library/debian:stable-backports
    steps:
      - name: Install sudo
        run: apt-get update -qq && apt-get install -y -qq sudo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AppImage
        run: CI=true ./build.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: Plasticity-*.AppImage
          retention-days: 1

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use token so git push is authenticated
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: appimage

      - name: Update nix/plasticity.nix with new version and hash
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          HASH=$(sha256sum "Plasticity-${VERSION}-x86_64.AppImage" \
            | awk '{print $1}' | xxd -r -p | base64 -w 0)
          sed -i "s|version = \"[^\"]*\";|version = \"${VERSION}\";|" nix/plasticity.nix
          sed -i "s|hash = \"sha256-[^\"]*\";|hash = \"sha256-${HASH}\";|" nix/plasticity.nix
          echo "Updated nix/plasticity.nix to v${VERSION} (sha256-${HASH})"

      - name: Commit, tag and push
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/plasticity.nix
          git commit -m "chore: update plasticity to v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin "HEAD:main"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "Plasticity-${VERSION}-x86_64.AppImage" \
            --title "Plasticity ${VERSION}" \
            --repo "${REPO}" \
            --notes "Automated AppImage build for [Plasticity v${VERSION}](https://github.com/nkallen/plasticity/releases/tag/v${VERSION})."
